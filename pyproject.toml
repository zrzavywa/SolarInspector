[tool.ruff]
target-version = "py311"
line-length = 88
force-exclude = true

[tool.ruff.lint]
select = [
    "E4",
    "E7",
    "E9",
    "F",
    "I",
]

[tool.ruff.format]
# Phase 01: Historische Formatierungsabweichungen werden schrittweise
# bei zukünftigen Änderungen der jeweiligen Module beseitigt.
exclude = [
    "app/github_updater.py",
    "app/modbus_solakon.py",
    "app/release_installer.py",
    "app/solarinspector.py",
    "app/updater_service.py",
    "tests/test_core.py",
    "tests/test_release_installer.py",
    "tests/test_update_api.py",
    "tests/test_update_download_api.py",
    "tests/test_updater_service.py",
]

[tool.mypy]
python_version = "3.11"
files = [
    "app/github_updater.py",
    "app/update_status.py",
    "app/modbus_solakon.py",
    "app/release_installer.py",
    "app/solarinspector_core/adapters/base.py",
    "app/solarinspector_core/adapters/grid_meter_factory.py",
    "app/solarinspector_core/adapters/shrdzm_grid_meter.py",
    "app/solarinspector_core/config/grid_meter.py",
    "app/solarinspector_core/adapters/compatibility.py",
    "app/solarinspector_core/adapters/shelly.py",
    "app/solarinspector_core/adapters/solakon_measurement.py",
    "app/solarinspector_core/models/device.py",
    "app/solarinspector_core/models/legacy.py",
    "app/solarinspector_core/models/measurement.py",
    "app/solarinspector_core/models/metrics.py",
    "app/solarinspector_core/models/quality.py",
    "app/solarinspector_core/models/roles.py",
    "app/solarinspector_core/models/units.py",
    "app/solarinspector_core/persistence/database.py",
    "app/solarinspector_core/services/collector.py",
]
check_untyped_defs = true
warn_unused_configs = true
warn_unused_ignores = true
show_error_codes = true
