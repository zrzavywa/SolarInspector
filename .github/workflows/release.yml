name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            app/requirements.txt
            updater/requirements.txt

      - name: Entwicklungsabhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Formatierung prüfen
        run: |
          python -m ruff format --check app tests

      - name: Python-Code prüfen
        run: |
          python -m ruff check app tests

      - name: Typprüfung ausführen
        run: |
          python -m mypy

      - name: Tests ausführen
        env:
          SOLARINSPECTOR_SECRET: github-actions-release-secret
        run: |
          python -m pytest -v tests

      - name: Version gegen Tag prüfen
        run: |
          FILE_VERSION="$(tr -d '[:space:]' < VERSION)"
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          if [ "$FILE_VERSION" != "$TAG_VERSION" ]; then
            echo "Fehler: VERSION=$FILE_VERSION, Tag=$TAG_VERSION"
            exit 1
          fi

      - name: Release-Paket erzeugen
        run: |
          chmod +x scripts/build-release.sh
          ./scripts/build-release.sh

      - name: GitHub Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/SolarInspector-*.tar.gz
            dist/SolarInspector-*.sha256
            release-manifest.json
